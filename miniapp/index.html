<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="color-scheme" content="light dark">
    <title>ACAMEDICS — Justificación</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;500;600;700&family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @font-face { font-family: 'Neue Kabel'; src: local('Neue Kabel'), local('ITC Kabel'); }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            color-scheme: light dark;
            --primary: #18828C;
            --primary-dark: #126A72;
            --primary-glow: rgba(24,130,140,0.10);
            --primary-subtle: rgba(24,130,140,0.04);
            --accent: #C84677;
            --accent-subtle: rgba(200,70,119,0.06);

            --navy: #0F172A;
            --navy-soft: #1E293B;
            --slate: #334155;
            --text: #1A1A2E;
            --text-body: #333333;
            --text-muted: #94A3B8;
            --border: #E2E8F0;
            --bg: #FFFFFF;

            --font-title: 'Neue Kabel', 'Josefin Sans', 'Helvetica Neue', sans-serif;
            --font-body: 'Source Sans 3', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-size-base: 15px;
        }

        /* ═══════════════════════════════════════════
           DARK THEME
        ═══════════════════════════════════════════ */
        [data-theme="dark"] {
            --bg: #161616;
            --navy: #FFFFFF;
            --navy-soft: #FFFFFF;
            --slate: #E0E0E0;
            --text: #FFFFFF;
            --text-body: #ECECEC;
            --text-muted: #8A8A8A;
            --border: #2A2A2A;

            --primary: #20A4B0;
            --primary-dark: #18828C;
            --primary-glow: rgba(32,164,176,0.18);
            --primary-subtle: rgba(32,164,176,0.08);
            --accent: #E05A8D;
            --accent-subtle: rgba(224,90,141,0.10);
        }
        [data-theme="dark"] .answer-strip { background: #1B7A83; }
        [data-theme="dark"] .answer-letter { background: rgba(255,255,255,0.14); }
        [data-theme="dark"] .tip-section { background: rgba(32,164,176,0.06); }
        [data-theme="dark"] .tip-text { border-left-color: var(--primary); }
        [data-theme="dark"] .bib-item { border-bottom-color: rgba(255,255,255,0.06); }
        [data-theme="dark"] .footer { border-top-color: var(--border); }
        .header-logo-text {
            font-family: var(--font-title);
            font-size: 14px; font-weight: 400;
            color: var(--navy);
            letter-spacing: -0.3px;
            margin-top: 2px;
        }
        [data-theme="dark"] .header-birrete svg rect { fill: #20A4B0; }
        [data-theme="dark"] .header-birrete svg circle,
        [data-theme="dark"] .header-birrete svg rect:not(:first-child) { fill: #FFFFFF; }
        [data-theme="dark"] .scroll-top { box-shadow: 0 2px 14px rgba(0,0,0,0.5); }
        [data-theme="dark"] .img-toggle-count { background: var(--border); color: var(--slate); }
        [data-theme="dark"] .motivation-text { color: #BDBDBD; }
        [data-theme="dark"] .footer-logo-text { color: #BDBDBD; opacity: 0.6; }
        [data-theme="dark"] .footer-link { color: #BDBDBD; }
        [data-theme="dark"] .footer-copy { color: #BDBDBD; opacity: 0.5; }
        [data-theme="dark"] .divider--primary { background: linear-gradient(90deg, var(--primary), var(--border) 70%, transparent); }
        [data-theme="dark"] .bottom-bar { background: linear-gradient(90deg, #333, var(--primary), var(--accent)); }
        [data-theme="dark"] .lightbox { background: rgba(0,0,0,0.96); }

        html, body {
            background: var(--bg) !important; color: var(--text) !important;
            font-family: var(--font-body); font-size: var(--font-size-base);
            line-height: 1.6; overflow-x: hidden;
            -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
            -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        .app { max-width: 640px; margin: 0 auto; padding: 0 20px 12px; }

        /* ═══════════════════════════════════════════
           LOADING & ERROR
        ═══════════════════════════════════════════ */
        .loading-container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; gap: 16px; }
        .spinner { width: 40px; height: 40px; border: 3px solid var(--primary); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { font-size: 14px; color: var(--text-muted); text-align: center; }
        .error-container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; gap: 16px; padding: 20px; }
        .error-icon { font-size: 40px; }
        .error-text { font-size: 14px; color: var(--text-muted); text-align: center; }
        .retry-btn { background: var(--primary); color: #fff; border: none; padding: 10px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }

        /* ═══════════════════════════════════════════
           HEADER
        ═══════════════════════════════════════════ */
        .header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 0 14px;
        }
        .header-left { display: flex; align-items: center; gap: 6px; }
        .header-birrete { width: 24px; height: 24px; flex-shrink: 0; }
        .header-birrete svg { width: 100%; height: 100%; display: block; }
        .header-logo { height: 17px; width: auto; display: block; }
        .header-divider { width: 1px; height: 14px; background: var(--border); }
        .header-case {
            font-family: var(--font-title);
            font-size: 11px; font-weight: 600;
            color: var(--primary); text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 2px;
        }

        /* ═══════════════════════════════════════════
           DIVIDER
        ═══════════════════════════════════════════ */
        .divider { height: 1px; background: var(--border); }
        .divider--primary {
            height: 2px;
            background: linear-gradient(90deg, var(--primary), var(--border) 70%, transparent);
        }

        /* ═══════════════════════════════════════════
           HERO SECTION — title + answer
        ═══════════════════════════════════════════ */
        .hero { padding: 24px 0 28px; }

        .eyebrow-row {
            display: flex; align-items: flex-start; justify-content: space-between;
            gap: 12px; margin-bottom: 20px;
        }
        .eyebrow-row .hero-title { margin-bottom: 0; }

        .ctrl-btns { display: flex; gap: 6px; flex-shrink: 0; }
        button, .font-btn, .theme-btn { touch-action: manipulation; }
        .font-btn, .theme-btn {
            border: 1.5px solid var(--border); background: var(--bg);
            font-family: var(--font-title); font-size: 13px; font-weight: 500;
            color: var(--text-muted); cursor: pointer;
            width: 32px; height: 32px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;
        }
        .font-btn:active, .font-btn.active,
        .theme-btn:active, .theme-btn.active {
            border-color: var(--primary); color: var(--primary);
        }
        .theme-btn svg { width: 16px; height: 16px; }
        .theme-btn .icon-sun,
        .theme-btn .icon-moon { display: none; }
        .theme-btn .icon-moon { display: block; }
        [data-theme="dark"] .theme-btn .icon-moon { display: none; }
        [data-theme="dark"] .theme-btn .icon-sun { display: block; }

        .hero-title {
            font-family: var(--font-title);
            font-size: 23px; font-weight: 300;
            color: var(--navy-soft);
            line-height: 1.35;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        /* Answer strip */
        .answer-strip {
            display: flex; align-items: center; gap: 14px;
            background: var(--primary);
            border-radius: 10px;
            padding: 14px 16px;
        }
        .answer-letter {
            font-family: var(--font-title);
            font-size: 20px; font-weight: 700;
            color: #FFFFFF;
            background: rgba(255,255,255,0.18);
            width: 34px; height: 34px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            padding-top: 2px;
        }
        .answer-text {
            font-family: var(--font-body);
            font-size: 15px; font-weight: 500;
            color: #FFFFFF;
            line-height: 1.4;
        }

        /* ═══════════════════════════════════════════
           JUSTIFICATION
        ═══════════════════════════════════════════ */
        .justification-section { padding: 28px 0 24px; }

        .justification {
            font-family: var(--font-body);
            font-size: var(--font-size-base);
            color: var(--text-body);
            line-height: 1.38;
            text-align: justify;
            transition: font-size 0.2s ease;
        }
        .justification p { margin-bottom: 14px; }
        .justification p:last-child { margin-bottom: 0; }

        /* Drop cap */
        .justification p:first-child::first-letter {
            font-family: var(--font-title);
            font-size: 3em;
            color: var(--accent);
            font-weight: 700;
            float: left;
            line-height: 0.8;
            margin-right: 8px;
            margin-top: 5px;
        }

        /* ═══════════════════════════════════════════
           TIP SECTION
        ═══════════════════════════════════════════ */
        .tip-section {
            padding: 0;
            background: var(--primary-subtle);
            margin: 0 -20px;
        }
        .tip-accent-bar {
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
        }
        .tip-inner { padding: 24px 20px 24px; }
        .tip-header {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 16px;
        }
        .tip-icon {
            width: 30px; height: 30px;
            border-radius: 8px;
            background: var(--primary-glow);
            display: flex; align-items: center; justify-content: center;
            font-size: 15px;
        }
        .tip-label {
            font-family: var(--font-title);
            font-size: 14px; font-weight: 700;
            color: var(--navy);
            letter-spacing: 0.3px;
        }
        .tip-label-accent { color: var(--primary); }
        .tip-text {
            font-family: var(--font-body);
            font-size: var(--font-size-base);
            color: var(--text-body);
            line-height: 1.38;
            padding-left: 16px;
            border-left: 3px solid var(--primary);
            text-align: justify;
        }

        /* ═══════════════════════════════════════════
           IMAGES ACCORDION
        ═══════════════════════════════════════════ */
        .img-accordion { margin: 24px 0 0; }
        .img-toggle {
            width: 100%; background: none; border: none;
            padding: 0 0 16px;
            display: flex; align-items: center; justify-content: space-between;
            cursor: pointer;
        }
        .img-toggle-left { display: flex; align-items: center; gap: 10px; }
        .img-toggle-icon {
            width: 26px; height: 26px;
            border-radius: 7px; background: var(--primary-glow);
            display: flex; align-items: center; justify-content: center;
        }
        .img-toggle-icon svg { width: 14px; height: 14px; color: var(--primary); }
        .img-toggle-text {
            font-family: var(--font-title);
            font-size: 12px; font-weight: 600;
            color: var(--slate);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .img-toggle-count {
            font-family: var(--font-body);
            font-size: 11px; color: var(--text-muted);
            background: var(--border); padding: 2px 8px; border-radius: 10px;
        }
        .img-chevron {
            width: 18px; height: 18px;
            color: var(--text-muted);
            transition: transform 0.3s;
        }
        .img-accordion.open .img-chevron { transform: rotate(180deg); }
        .img-content {
            max-height: 0; overflow: hidden;
            transition: max-height 0.4s ease;
        }
        .img-accordion.open .img-content { max-height: 3000px; }
        .img-content img {
            width: 100%; border-radius: 10px;
            margin-bottom: 12px; cursor: pointer;
            -webkit-user-drag: none;
            transition: transform 0.2s;
        }
        .img-content img:active { transform: scale(0.98); }

        /* Lightbox */
        .lightbox {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.92); z-index: 1000;
            align-items: center; justify-content: center; flex-direction: column; padding: 20px;
        }
        .lightbox.active { display: flex; }
        .lightbox img { max-width: 100%; max-height: 85vh; border-radius: 8px; object-fit: contain; }
        .lightbox-close {
            position: absolute; top: 16px; right: 16px;
            width: 36px; height: 36px; border-radius: 50%;
            background: rgba(255,255,255,0.15); border: none;
            color: #fff; font-size: 20px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(4px);
        }
        .lightbox-hint { color: rgba(255,255,255,0.5); font-size: 12px; margin-top: 12px; }

        /* ═══════════════════════════════════════════
           BIBLIOGRAPHY
        ═══════════════════════════════════════════ */
        .bib-section { padding: 24px 0 0; }
        .bib-toggle {
            width: 100%; background: none; border: none;
            padding: 0 0 16px;
            display: flex; align-items: center; justify-content: space-between;
            cursor: pointer;
        }
        .bib-toggle-left { display: flex; align-items: center; gap: 10px; }
        .bib-toggle-num {
            font-family: var(--font-title);
            font-size: 13px; font-weight: 600;
            color: var(--primary);
            width: 26px; height: 26px;
            border-radius: 7px;
            background: var(--primary-glow);
            display: flex; align-items: center; justify-content: center;
        }
        .bib-toggle-text {
            font-family: var(--font-title);
            font-size: 12px; font-weight: 600;
            color: var(--slate);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .bib-chevron {
            width: 18px; height: 18px;
            color: var(--text-muted);
            transition: transform 0.3s;
        }
        .bib-section.open .bib-chevron { transform: rotate(180deg); }
        .bib-content {
            max-height: 0; overflow: hidden;
            transition: max-height 0.35s ease;
        }
        .bib-section.open .bib-content { max-height: 800px; }
        .bib-list { padding: 0 0 8px; }
        .bib-item {
            display: flex; gap: 10px; align-items: flex-start;
            padding: 10px 0;
            border-bottom: 1px solid rgba(226,232,240,0.5);
        }
        .bib-item:last-child { border-bottom: none; }
        .bib-num {
            font-family: var(--font-title);
            font-size: 12px; font-weight: 600;
            color: var(--primary);
            min-width: 16px; padding-top: 2px;
        }
        .bib-ref {
            font-family: var(--font-body);
            font-size: 13px; color: var(--slate);
            line-height: 1.55;
        }

        /* ═══════════════════════════════════════════
           FOOTER
        ═══════════════════════════════════════════ */
        .footer {
            margin-top: 28px;
            padding: 18px 0 8px;
            border-top: 1px solid var(--border);
            text-align: center;
        }
        .motivation {
            position: relative;
            margin-bottom: 14px;
            padding: 0 16px;
        }
        .motivation-icon {
            position: absolute;
            left: 2px; top: 0;
            font-size: 11px;
        }
        .motivation-text {
            font-family: var(--font-body);
            font-size: 12px;
            font-style: italic;
            color: var(--text-muted);
            line-height: 1.5;
            text-align: center;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .footer-logo { text-align: center; margin-bottom: 12px; }
        .footer-logo-text {
            font-family: var(--font-title);
            font-size: 13px; font-weight: 400;
            color: var(--text-muted);
            opacity: 0.45; letter-spacing: -0.3px;
        }
        .footer-social {
            display: flex; justify-content: center; gap: 20px;
            margin-bottom: 8px;
        }
        .footer-link {
            display: flex; align-items: center; gap: 5px;
            text-decoration: none;
            font-family: var(--font-title);
            font-size: 11px; font-weight: 500;
            color: var(--text-muted);
            transition: color 0.2s;
        }
        .footer-link:hover { color: var(--primary); }
        .footer-link svg { width: 14px; height: 14px; }
        .footer-copy {
            font-family: var(--font-title);
            font-size: 10px; color: var(--text-muted);
            opacity: 0.5; letter-spacing: 0.5px;
            margin-top: 4px;
        }

        /* ═══════════════════════════════════════════
           SCROLL TO TOP
        ═══════════════════════════════════════════ */
        .scroll-top {
            position: fixed;
            bottom: 20px; right: 16px;
            width: 38px; height: 38px;
            border-radius: 50%;
            background: var(--primary);
            border: none; color: #fff;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 12px rgba(24,130,140,0.3);
            opacity: 0; transform: translateY(10px);
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none; z-index: 40;
        }
        .scroll-top.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .scroll-top:active { transform: scale(0.92); }
        .scroll-top svg { width: 18px; height: 18px; }

        /* ═══════════════════════════════════════════
           BOTTOM BAR
        ═══════════════════════════════════════════ */
        .bottom-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--navy), var(--primary), var(--accent));
            z-index: 50;
        }

        /* ═══════════════════════════════════════════
           RESPONSIVE
        ═══════════════════════════════════════════ */
        @media (max-width: 420px) {
            .hero-title { font-size: 22px; }
            .answer-letter { width: 30px; height: 30px; font-size: 17px; }
            .answer-text { font-size: 14px; }
        }
        @media (min-width: 768px) {
            :root { --font-size-base: 17px; }
            .answer-text { font-size: 16px; }
            .tip-text { font-size: 17px; }
            .bib-ref { font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="app" id="appContainer">
        <div id="content">
            <div class="loading-container">
                <div class="spinner"></div>
                <div class="loading-text"><div style="font-size:28px;margin-bottom:6px;">🎓</div>Cargando caso clínico...</div>
            </div>
        </div>
    </div>
    <button class="scroll-top" id="scrollTop"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 15l-6-6-6 6"/></svg></button>
    <div class="bottom-bar"></div>

    <script>
        // ─── Theme: sun/moon toggle (starts from system preference) ───
        const themeMql = window.matchMedia('(prefers-color-scheme: dark)');
        let savedTheme = null;
        try { savedTheme = localStorage.getItem('acamedics-theme'); } catch(e) {}

        function applyTheme(theme) {
            if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else {
                document.documentElement.removeAttribute('data-theme');
            }
        }
        function getEffective() {
            if (savedTheme) return savedTheme;
            return themeMql.matches ? 'dark' : 'light';
        }
        themeMql.addEventListener('change', () => {
            if (!savedTheme) applyTheme(themeMql.matches ? 'dark' : 'light');
        });
        applyTheme(getEffective());

        let tg = null;
        try {
            tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
            if (tg) { tg.ready(); tg.expand(); if (tg.disableVerticalSwipes) tg.disableVerticalSwipes(); }
        } catch(e) { console.warn('Telegram WebApp SDK not available'); }
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('selectstart', e => e.preventDefault());
        document.addEventListener('dragstart', e => e.preventDefault());

        const contentDiv = document.getElementById('content');

        // ─── Haptic feedback ───
        function haptic(style) {
            try {
                if (tg && tg.HapticFeedback) {
                    tg.HapticFeedback.impactOccurred(style || 'light');
                    return;
                }
            } catch(e) {}
            try { navigator.vibrate && navigator.vibrate(style === 'medium' ? 15 : 8); } catch(e) {}
        }

        // ─── Motivational phrases ───
        const phrases = [
            // ── Clásicos verificados ──
            { text: "El médico que solo sabe de medicina, ni de medicina sabe.", author: "José de Letamendi" },
            { text: "La medicina es la ciencia de la incertidumbre y el arte de la probabilidad.", author: "William Osler" },
            { text: "Donde quiera que se ama el arte de la medicina, se ama también a la humanidad.", author: "Platón" },
            { text: "El buen médico trata la enfermedad; el gran médico trata al paciente que tiene la enfermedad.", author: "William Osler" },
            { text: "La paciencia es la mejor medicina.", author: "John Florio" },
            { text: "El acto médico es un acto de amor.", author: "Gregorio Marañón" },
            { text: "El médico competente, antes de dar una medicina, primero diagnostica la enfermedad.", author: "Cicerón" },
            { text: "La función del médico es entretener al paciente mientras la naturaleza cura la enfermedad.", author: "Voltaire" },
            { text: "La excelencia no es un acto, sino un hábito.", author: "Aristóteles" },
            { text: "Curar a veces, aliviar con frecuencia, consolar siempre.", author: "Hipócrates" },
            { text: "La vida es breve, el arte largo, la ocasión fugaz, la experiencia engañosa, el juicio difícil.", author: "Hipócrates" },
            { text: "No hay enfermedades, sino enfermos.", author: "Gregorio Marañón" },
            { text: "El secreto de la atención del paciente está en interesarse por el paciente.", author: "Francis Peabody" },
            { text: "La medicina es una ciencia social, y la política no es más que medicina a gran escala.", author: "Rudolf Virchow" },
            { text: "Escucha al paciente; él te está diciendo el diagnóstico.", author: "William Osler" },
            { text: "El que estudia la medicina sin los libros navega sin brújula; pero el que la estudia sin pacientes no navega.", author: "William Osler" },
            { text: "La primera obligación del médico es educar a las masas para que no necesiten de él.", author: "Santiago Ramón y Cajal" },
            { text: "Todo hombre puede ser, si se lo propone, escultor de su propio cerebro.", author: "Santiago Ramón y Cajal" },
            { text: "No hay hechos pequeños. Lo que llamamos pequeño es simplemente algo que no entendemos.", author: "Santiago Ramón y Cajal" },
            { text: "La clínica es soberana.", author: "Aforismo médico" },
            { text: "Primum non nocere: ante todo, no hacer daño.", author: "Principio hipocrático" },
            { text: "Un médico que no tiene nada que hacer con su cabeza recurre a sus manos.", author: "Abraham Verghese" },
            { text: "En nada se parece tanto el médico a Dios como en el deseo de ayudar al prójimo.", author: "Maimónides" },
            { text: "Quien salva una vida, salva al mundo entero.", author: "Talmud" },
            { text: "Los médicos no solo deben conocer la enfermedad, sino también al ser humano.", author: "Rudolf Virchow" },
            { text: "La medicina no es solo una ciencia, es también un arte. No se trata solo de pastillas y pociones.", author: "Paracelso" },
            { text: "El investigador sufre las decepciones, los largos meses pasados en una dirección equivocada, pero llega.", author: "Santiago Ramón y Cajal" },
            { text: "Siempre que enseñes, enseña también a dudar de lo que enseñas.", author: "José Ortega y Gasset" },
            // ── Motivacionales para el estudio ──
            { text: "Estudia, porque el día menos pensado alguien dependerá de lo que tú sabes.", author: "Anónimo" },
            { text: "No estudies para aprobar. Estudia para saber. Y cuando sepas, no podrás reprobar.", author: "Anónimo" },
            { text: "Cada paciente que atiendes es un libro que te enseña algo nuevo.", author: "Anónimo" },
            { text: "El éxito en medicina se construye caso a caso, día a día.", author: "Anónimo" }
        ];
        function getPhrase() { return phrases[Math.floor(Math.random() * phrases.length)]; }

        // ─── Utility functions ───
        function stripBibPrefix(t) { return t.replace(/^\s*(\d+[\.\)\-\]]\s*|\[\d+\]\s*|-\s*|•\s*|–\s*|►\s*|>\s*)/,'').trim(); }

        function parseBibliography(bib) {
            if (Array.isArray(bib) && bib.length > 0) {
                if (bib.length === 1 && bib[0].includes('\n')) return bib[0].split('\n').map(s=>s.trim()).filter(s=>s.length>10);
                const expanded = [];
                bib.forEach(item => {
                    if (item.includes('\n')) item.split('\n').map(s=>s.trim()).filter(s=>s.length>10).forEach(s=>expanded.push(s));
                    else if (item.trim().length>0) expanded.push(item.trim());
                });
                return expanded;
            }
            if (typeof bib === 'string') return bib.split('\n').map(s=>s.trim()).filter(s=>s.length>10);
            return [];
        }

        function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
        function mdBold(s) {
            // Convert **text** to <b>text</b> AFTER esc() so it's safe
            // Also convert *text* (single) to <i>text</i> for italic
            return s
                .replace(/\*\*(.+?)\*\*/g, '<b>$1</b>')
                .replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<i>$1</i>');
        }

        // ─── Load case from Supabase ───
        async function loadCase() {
            try {
                let caseId = new URLSearchParams(window.location.search).get('case');
                if (!caseId && tg && tg.initDataUnsafe && tg.initDataUnsafe.start_param) {
                    caseId = tg.initDataUnsafe.start_param;
                }
                if (!caseId && new URLSearchParams(window.location.hash.replace('#','?')).get('tgWebAppStartParam')) {
                    caseId = new URLSearchParams(window.location.hash.replace('#','?')).get('tgWebAppStartParam');
                }
                if (!caseId) { showError('No se especificó caso clínico'); return; }
                const ak = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1eGV3enplcWdsdWltZm1pZ2pzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NjYwMjcsImV4cCI6MjA4ODI0MjAyN30.fDyK2PwJCpCOi8axSNw_hmFRe5tSxyptoErWIpS2JLQ';
                const base = 'https://xuxewzzeqgluimfmigjs.supabase.co/rest/v1';
                const h = { 'apikey': ak, 'Content-Type': 'application/json' };
                const cr = await fetch(base+'/cases?id=eq.'+caseId+'&select=*', {headers:h});
                if (!cr.ok) throw new Error('fetch error');
                const cases = await cr.json();
                if (!cases.length) { showError('Caso clínico no encontrado'); return; }
                renderCase(cases[0]);
            } catch(e) { console.error(e); showError('Error cargando el caso clínico'); }
        }

        // ─── Render case with new design ───
        // Generate a consistent display number (1000-3000) from UUID
        function caseDisplayNum(uuid) {
            if (!uuid) return 1000;
            let hash = 0;
            for (let i = 0; i < uuid.length; i++) {
                hash = ((hash << 5) - hash) + uuid.charCodeAt(i);
                hash |= 0;
            }
            return 1000 + (Math.abs(hash) % 2001); // 1000–3000
        }

        function renderCase(d) {
            const phrase = getPhrase();
            const caseNum = caseDisplayNum(d.id || '');
            let html = '';

            // ── HEADER ──
            html += '<div class="header">';
            html += '<div class="header-left">';
            html += '<div class="header-birrete"><svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><rect width="40" height="40" rx="10" fill="#18828C"/><g transform="translate(4,7) scale(0.5)"><polygon points="32,6 4,22 32,38 60,22" fill="white"/><path d="M16 24v10c0 5.5 7.2 10 16 10s16-4.5 16-10V24" fill="rgba(255,255,255,0.9)"/><rect x="54" y="22" width="3" height="20" rx="1.5" fill="white"/><circle cx="55.5" cy="44" r="3" fill="white"/></g></svg></div>';
            html += '<span class="header-logo-text">ACAMEDICS</span>';
            html += '<div class="header-divider"></div>';
            html += '<span class="header-case">Caso #'+esc(String(caseNum))+'</span>';
            html += '</div></div>';

            // ── PRIMARY DIVIDER ──
            html += '<div class="divider--primary"></div>';

            // ── HERO: title + answer ──
            html += '<div class="hero">';
            html += '<div class="eyebrow-row">';
            html += '<h2 class="hero-title">Análisis y Fundamentación<br>del Caso Clínico</h2>';
            html += '<div class="ctrl-btns">';
            html += '<button class="font-btn" id="fontCycle">Aa</button>';
            html += '<button class="theme-btn" id="themeToggle" title="Cambiar tema">';
            html += '<svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>';
            html += '<svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
            html += '</button></div>';
            html += '</div>';
            if (d.correct_letter && d.correct_text) {
                html += '<div class="answer-strip">';
                html += '<div class="answer-letter">'+esc(d.correct_letter.toUpperCase())+'</div>';
                html += '<div class="answer-text">'+esc(d.correct_text)+'</div>';
                html += '</div>';
            }
            html += '</div>';

            // ── DIVIDER ──
            html += '<div class="divider"></div>';

            // ── JUSTIFICATION ──
            if (d.justification) {
                html += '<div class="justification-section">';
                html += '<div class="justification" id="justText">';

                let justText = d.justification;
                // Fix option-letter references in justification text
                justText = justText.replace(/((?:opci[oó]n|respuesta|alternativa|inciso|literal|la|el|\()\s*)\n\s*([A-Fa-f][.),:]\s*)/gi, '$1$2');
                justText = justText.replace(/\n\s*([A-Fa-f][.)]\s+[a-záéíóúñ])/g, ' $1');
                justText = justText.replace(/\n\s*(\(?[A-Fa-f][.)]\)?)\s*\n/g, ' $1 ');

                const hasDoubleNL = /\n\s*\n/.test(justText);
                let paras;
                if (hasDoubleNL) {
                    paras = justText.split(/\n\s*\n/).filter(p=>p.trim());
                } else {
                    paras = justText.split(/\n/).filter(p=>p.trim());
                }
                paras.forEach(p => {
                    const merged = p.split('\n').map(l=>l.trim()).filter(l=>l).join(' ');
                    html += '<p>'+mdBold(esc(merged))+'</p>';
                });
                html += '</div></div>';
            }

            // ── TIP SECTION (full-bleed) ──
            if (d.tip) {
                html += '<div class="tip-section">';
                html += '<div class="tip-accent-bar"></div>';
                html += '<div class="tip-inner">';
                html += '<div class="tip-header">';
                html += '<div class="tip-icon">💡</div>';
                html += '<span class="tip-label">Tip <span class="tip-label-accent">ACAMÉDICO</span></span>';
                html += '</div>';
                html += '<div class="tip-text">'+mdBold(esc(d.tip))+'</div>';
                html += '</div></div>';
            }

            // ── IMAGES ACCORDION ──
            const caseImages = Array.isArray(d.images) ? d.images : [];
            if (caseImages.length) {
                html += '<div class="img-accordion open" id="imgAccordion">';
                html += '<button class="img-toggle" id="imgToggle">';
                html += '<div class="img-toggle-left">';
                html += '<div class="img-toggle-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg></div>';
                html += '<span class="img-toggle-text">Recurso Adicional</span>';
                html += '<span class="img-toggle-count">'+caseImages.length+'</span>';
                html += '</div>';
                html += '<svg class="img-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>';
                html += '</button>';
                html += '<div class="img-content">';
                caseImages.forEach((url,i) => {
                    if(url && typeof url === 'string')
                        html += '<img src="'+esc(url)+'" alt="Recurso '+(i+1)+'" loading="lazy" data-full="'+esc(url)+'">';
                });
                html += '</div></div>';
            }

            // ── BIBLIOGRAPHY ACCORDION ──
            const bibRefs = parseBibliography(d.bibliography);
            if (bibRefs.length > 0) {
                html += '<div class="bib-section" id="bibSection">';
                html += '<button class="bib-toggle" id="bibToggle">';
                html += '<div class="bib-toggle-left">';
                html += '<div class="bib-toggle-num">'+bibRefs.length+'</div>';
                html += '<span class="bib-toggle-text">Referencias bibliográficas</span>';
                html += '</div>';
                html += '<svg class="bib-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>';
                html += '</button>';
                html += '<div class="bib-content"><div class="bib-list">';
                bibRefs.forEach((r,i) => {
                    html += '<div class="bib-item">';
                    html += '<span class="bib-num">'+(i+1)+'.</span>';
                    html += '<span class="bib-ref">'+esc(stripBibPrefix(r))+'</span>';
                    html += '</div>';
                });
                html += '</div></div></div>';
            }

            // ── FOOTER ──
            html += '<div class="footer">';
            // Motivational phrase
            html += '<div class="motivation">';
            html += '<span class="motivation-icon">✨</span>';
            html += '<span class="motivation-text">"'+esc(phrase.text)+'" — '+esc(phrase.author)+'</span>';
            html += '</div>';
            // Logo
            html += '<div class="footer-logo">';
            html += '<span class="footer-logo-text">ACAMEDICS</span>';
            html += '</div>';
            // Social
            html += '<div class="footer-social">';
            html += '<a href="https://instagram.com/acamedics.co" target="_blank" rel="noopener" class="footer-link">';
            html += '<svg viewBox="0 0 24 24" fill="none"><rect x="2" y="2" width="20" height="20" rx="5" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="12" r="4.5" stroke="currentColor" stroke-width="1.5"/><circle cx="17.5" cy="6.5" r="1.2" fill="currentColor"/></svg>';
            html += '@acamedics.co</a>';
            html += '<a href="#" class="footer-link" id="tgScrollTop">';
            html += '<svg viewBox="0 0 24 24" fill="none"><path d="M21.2 4.3L2.4 10.5c-.6.2-.6 1.1 0 1.3l4.5 1.7 1.7 5.5c.2.5.8.7 1.2.4l2.5-2 4.3 3.2c.5.4 1.2.1 1.3-.5L21.8 5.2c.2-.7-.3-1.2-.6-.9z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>';
            html += '@acamedics_co</a>';
            html += '</div>';
            // Copyright
            html += '<div class="footer-copy">&copy; '+new Date().getFullYear()+' ACAMEDICS. Todos los derechos reservados.</div>';
            html += '</div>';

            // ── LIGHTBOX ──
            html += '<div class="lightbox" id="lightbox"><button class="lightbox-close" id="lightboxClose">&times;</button><img id="lightboxImg" src="" alt=""><div class="lightbox-hint">Toca para cerrar</div></div>';

            contentDiv.innerHTML = html;

            // ── Event listeners ──
            // Bibliography accordion
            const bt = document.getElementById('bibToggle');
            if (bt) bt.addEventListener('click', () => { haptic('light'); document.getElementById('bibSection').classList.toggle('open'); });

            // Images accordion
            const it = document.getElementById('imgToggle');
            if (it) it.addEventListener('click', () => { haptic('light'); document.getElementById('imgAccordion').classList.toggle('open'); });

            // Lightbox
            const lb = document.getElementById('lightbox');
            const lbImg = document.getElementById('lightboxImg');
            document.querySelectorAll('.img-content img').forEach(img => {
                img.addEventListener('click', () => {
                    haptic('light');
                    lbImg.src = img.getAttribute('data-full') || img.src;
                    lb.classList.add('active');
                });
            });
            const closeLb = () => { haptic('light'); lb.classList.remove('active'); };
            document.getElementById('lightboxClose').addEventListener('click', closeLb);
            lb.addEventListener('click', e => { if (e.target === lb || e.target.classList.contains('lightbox-hint')) closeLb(); });

            // Telegram link: scroll to top
            const tgLink = document.getElementById('tgScrollTop');
            if (tgLink) tgLink.addEventListener('click', e => { e.preventDefault(); haptic('light'); window.scrollTo({top: 0, behavior: 'smooth'}); });

            // Font size cycle: [-2, 0, 2, 4]
            const sizes = [-2, 0, 2, 4];
            let sizeIdx = 1; // start at 0 offset (15px)
            const fc = document.getElementById('fontCycle');
            if (fc) fc.addEventListener('click', e => {
                e.stopPropagation();
                haptic('medium');
                sizeIdx = (sizeIdx + 1) % sizes.length;
                const newSize = 15 + sizes[sizeIdx];
                document.documentElement.style.setProperty('--font-size-base', newSize + 'px');
                fc.classList.toggle('active', sizeIdx !== 1);
            });

            // Theme toggle: simple sun/moon flip
            const tt = document.getElementById('themeToggle');
            if (tt) tt.addEventListener('click', e => {
                e.stopPropagation();
                haptic('medium');
                savedTheme = getEffective() === 'dark' ? 'light' : 'dark';
                try { localStorage.setItem('acamedics-theme', savedTheme); } catch(ex) {}
                applyTheme(savedTheme);
            });
        }

        // Scroll to top button
        const scrollBtn = document.getElementById('scrollTop');
        window.addEventListener('scroll', () => {
            scrollBtn.classList.toggle('visible', window.scrollY > 400);
        }, { passive: true });
        scrollBtn.addEventListener('click', () => {
            haptic('light');
            window.scrollTo({top: 0, behavior: 'smooth'});
        });

        function showError(m) {
            contentDiv.innerHTML = '<div class="error-container"><div class="error-icon">⚠️</div><div class="error-text">'+m+'</div><button class="retry-btn" onclick="location.reload()">Reintentar</button></div>';
        }

        loadCase();
    </script>
</body>
</html>
